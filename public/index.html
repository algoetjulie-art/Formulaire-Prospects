<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parlons de votre projet — No-Code</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #fdfbfb 0%, #ebedee 100%);
      font-family: 'DM Sans', sans-serif;
      padding: 20px;
      color: #1a1a2e;
    }
    .container { max-width: 640px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 32px; }
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px; font-weight: 700; margin-bottom: 8px;
    }
    .header p { color: #6b7280; font-size: 15px; }

    /* Progress */
    .progress-steps { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .step-dot {
      display: flex; flex-direction: column; align-items: center;
      cursor: default; transition: opacity 0.3s;
    }
    .step-dot.clickable { cursor: pointer; }
    .step-dot.inactive { opacity: 0.4; }
    .dot {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; transition: all 0.3s;
    }
    .dot.active { background: #1a1a2e; color: #fff; }
    .dot.inactive { background: #e5e7eb; color: #9ca3af; }
    .step-label {
      font-size: 11px; margin-top: 4px; text-align: center; max-width: 60px;
    }
    .progress-bar { height: 4px; background: #e5e7eb; border-radius: 4px; overflow: hidden; margin-bottom: 32px; }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border-radius: 4px; transition: width 0.4s ease;
    }

    /* Card */
    .card {
      background: #fff; border-radius: 20px; padding: 36px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06); border: 1px solid #f3f4f6;
    }
    .card.shake { animation: shake 0.4s ease; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 700; margin-bottom: 6px;
    }
    .card .subtitle { color: #9ca3af; font-size: 14px; margin-bottom: 28px; }

    /* Fields */
    .field { margin-bottom: 28px; }
    .field.hidden { display: none; }
    .field label {
      display: block; margin-bottom: 10px; font-weight: 600; font-size: 15px;
    }
    .field label .req { color: #e74c3c; margin-left: 4px; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 12px 16px; border-radius: 12px;
      border: 2px solid #e5e7eb; font-size: 15px;
      font-family: 'DM Sans', sans-serif; outline: none;
      transition: border-color 0.2s; background: #fafafa;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: #6366f1; }
    .field textarea { resize: vertical; min-height: 80px; }

    /* Chips */
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      padding: 10px 18px; border-radius: 50px;
      border: 2px solid #d1d5db; background: #fff;
      color: #374151; font-size: 14px; cursor: pointer;
      transition: all 0.2s ease; font-family: 'DM Sans', sans-serif;
      line-height: 1.4;
    }
    .chip.selected { border-color: #1a1a2e; background: #1a1a2e; color: #fff; }

    /* Nav */
    .nav { display: flex; justify-content: space-between; margin-top: 32px; gap: 12px; }
    .btn {
      padding: 14px 28px; border-radius: 50px; font-size: 15px;
      font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: all 0.2s; border: none;
    }
    .btn-back { border: 2px solid #e5e7eb; background: #fff; color: #374151; }
    .btn-next {
      padding: 14px 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; box-shadow: 0 4px 14px rgba(99,102,241,0.35);
    }
    .btn-next:hover { transform: translateY(-1px); }
    .btn-next.disabled { background: #d1d5db; box-shadow: none; cursor: not-allowed; }
    .btn-submit {
      padding: 14px 28px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; box-shadow: 0 4px 14px rgba(99,102,241,0.35);
    }
    .btn-submit:hover { transform: translateY(-1px); }
    .btn-submit.sending { background: #9ca3af; box-shadow: none; cursor: wait; }
    .btn-copy { border: 2px solid #e5e7eb; background: #fff; color: #374151; }
    .btn-copy:hover { transform: translateY(-1px); }

    /* Recap */
    .recap-banner {
      border-radius: 16px; padding: 24px; margin-bottom: 20px;
      font-size: 16px; font-weight: 600;
    }
    .recap-banner.pending { background: linear-gradient(135deg, #eff6ff, #eef2ff); border: 2px solid #93c5fd; color: #1e40af; }
    .recap-banner.success { background: linear-gradient(135deg, #f0fdf4, #ecfdf5); border: 2px solid #86efac; color: #166534; }
    .recap-item {
      margin-bottom: 16px; padding: 16px 20px; background: #f9fafb;
      border-radius: 12px; border: 1px solid #e5e7eb;
    }
    .recap-item .label {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: #6b7280; margin-bottom: 6px;
    }
    .recap-item .value { font-size: 15px; }
    .error-box {
      padding: 12px 16px; background: #fef2f2; border: 1px solid #fca5a5;
      border-radius: 12px; margin-bottom: 12px; color: #991b1b; font-size: 14px;
    }
    .recap-actions { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }

    .footer { text-align: center; font-size: 12px; color: #9ca3af; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Parlons de votre projet</h1>
      <p>Quelques questions pour mieux comprendre vos besoins</p>
    </div>

    <div class="progress-steps" id="progressSteps"></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <div class="card" id="card">
      <h2 id="stepTitle"></h2>
      <p class="subtitle" id="stepSubtitle"></p>
      <div id="stepContent"></div>
      <div class="nav" id="navButtons"></div>
    </div>

    <p class="footer">Formulaire confidentiel — vos données ne sont pas partagées</p>
  </div>

<script>
const STEPS = [
  { id:"profil", title:"Votre profil", subtitle:"Faisons connaissance avec votre activité", icon:"👤" },
  { id:"besoins", title:"Vos besoins", subtitle:"Ce qui vous manque aujourd'hui", icon:"🎯" },
  { id:"projet", title:"Votre projet", subtitle:"Ce que vous aimeriez construire", icon:"🚀" },
  { id:"recap", title:"Récapitulatif", subtitle:"Vos réponses en un coup d'œil", icon:"✅" },
];

const QUESTIONS = {
  profil: [
    { key:"prenom", label:"Votre prénom", type:"text", placeholder:"Ex : Sophie", required:true },
    { key:"email", label:"Votre adresse email", type:"text", placeholder:"Ex : sophie@example.com", required:true },
    { key:"activite", label:"Quel est votre secteur d'activité ?", type:"select",
      options:["E-commerce","Services / Prestation","Coaching / Formation","Artisanat / Commerce local","Agence / Freelance","SaaS / Tech","Autre"], required:true },
    { key:"activite_autre", label:"Précisez votre secteur", type:"text", placeholder:"Votre secteur…", showIf:a=>a.activite==="Autre" },
    { key:"role", label:"Quel est votre rôle ?", type:"select",
      options:["Fondateur·rice / CEO","Directeur·rice / Manager","Responsable marketing / comm","Freelance / Solopreneur","Autre"], required:true },
    { key:"role_autre", label:"Précisez votre rôle", type:"text", placeholder:"Votre rôle…", showIf:a=>a.role==="Autre" },
    { key:"taille", label:"Taille de votre entreprise", type:"chips",
      options:["Solo","2-5 personnes","6-20 personnes","20+"], required:true },
  ],
  besoins: [
    { key:"frustrations", label:"Quelles sont vos principales frustrations aujourd'hui ?", type:"multi",
      options:[
        "Je perds du temps sur des tâches que je pourrais déléguer ou simplifier",
        "J'ai du mal à suivre mon activité (clients, commandes, chiffres…)",
        "Je bricole avec plein d'outils qui ne communiquent pas entre eux",
        "Je fais trop de choses manuellement et ça me freine",
        "J'aimerais offrir une meilleure expérience à mes clients",
        "Je n'ai pas de vue claire sur ce qui fonctionne ou pas dans mon business",
        "Je me sens bloqué·e par la technique",
      ] },
    { key:"taches_chronophages", label:"Quelles tâches vous prennent le plus de temps ?", type:"textarea",
      placeholder:"Ex : relancer les clients, mettre à jour mon catalogue, gérer mes emails…" },
    { key:"deja_essaye", label:"Avez-vous déjà essayé de résoudre ce problème ?", type:"chips",
      options:["Non, je ne sais pas par où commencer","Oui, avec un dev mais c'était cher","Oui, j'ai testé des outils seul·e","Oui, avec un·e freelance/VA"], required:true },
  ],
  projet: [
    { key:"type_projet", label:"Quel type de projet vous intéresse ?", type:"multi",
      options:[
        "Créer un site web ou une app",
        "Automatiser des tâches (emails, relances, data…)",
        "Construire un outil interne (CRM, dashboard, suivi…)",
        "Connecter mes outils entre eux",
        "Créer un espace client / portail",
        "Je ne sais pas encore, j'ai besoin de conseil",
      ] },
    { key:"urgence", label:"C'est pour quand ?", type:"chips",
      options:["C'est urgent — maintenant","Dans le mois","Dans les 3 prochains mois","Pas de deadline, je me renseigne"], required:true },
    { key:"commentaire", label:"Un mot à ajouter ? Une question ?", type:"textarea", placeholder:"Dites-moi tout 😊" },
  ],
};

let currentStep = 0;
let answers = {};
let sent = false;

function render() {
  const step = STEPS[currentStep];
  const isRecap = step.id === "recap";
  const progress = (currentStep / (STEPS.length - 1)) * 100;

  // Progress bar
  document.getElementById("progressFill").style.width = progress + "%";

  // Progress dots
  const dotsHtml = STEPS.map((s, i) => {
    const active = i <= currentStep;
    const done = i < currentStep;
    return `<div class="step-dot ${active ? '' : 'inactive'} ${done ? 'clickable' : ''}" onclick="${done ? 'goTo('+i+')' : ''}">
      <div class="dot ${active ? 'active' : 'inactive'}">${done ? '✓' : s.icon}</div>
      <span class="step-label" style="color:${active?'#1a1a2e':'#9ca3af'};font-weight:${i===currentStep?700:400}">${s.title}</span>
    </div>`;
  }).join("");
  document.getElementById("progressSteps").innerHTML = dotsHtml;

  // Title
  document.getElementById("stepTitle").textContent = step.icon + " " + step.title;
  document.getElementById("stepSubtitle").textContent = step.subtitle;

  // Content
  const content = document.getElementById("stepContent");
  const nav = document.getElementById("navButtons");

  if (isRecap) {
    content.innerHTML = renderRecap();
    nav.innerHTML = "";
  } else {
    const questions = QUESTIONS[step.id] || [];
    content.innerHTML = questions.map(q => renderField(q)).join("");
    bindFieldEvents(questions);

    const canGo = canAdvance();
    nav.innerHTML = `
      ${currentStep > 0 ? '<button class="btn btn-back" onclick="prev()">← Retour</button>' : '<div></div>'}
      <button class="btn btn-next ${canGo ? '' : 'disabled'}" onclick="next()">
        ${currentStep === STEPS.length - 2 ? 'Voir le récap →' : 'Suivant →'}
      </button>
    `;
  }
}

function renderField(q) {
  const visible = !q.showIf || q.showIf(answers);
  const val = answers[q.key] || "";
  let html = `<div class="field ${visible ? '' : 'hidden'}" data-key="${q.key}">`;
  html += `<label>${q.label}${q.required ? '<span class="req">*</span>' : ''}</label>`;

  if (q.type === "text") {
    html += `<input type="text" value="${(val||'').replace(/"/g,'&quot;')}" placeholder="${q.placeholder||''}" data-key="${q.key}">`;
  } else if (q.type === "select") {
    html += `<select data-key="${q.key}"><option value="">— Choisir —</option>`;
    q.options.forEach(o => { html += `<option value="${o}" ${val===o?'selected':''}>${o}</option>`; });
    html += `</select>`;
  } else if (q.type === "textarea") {
    html += `<textarea data-key="${q.key}" placeholder="${q.placeholder||''}" rows="3">${val||''}</textarea>`;
  } else if (q.type === "chips") {
    html += `<div class="chips">`;
    q.options.forEach(o => { html += `<div class="chip ${val===o?'selected':''}" data-key="${q.key}" data-value="${o}">${o}</div>`; });
    html += `</div>`;
  } else if (q.type === "multi") {
    const arr = val || [];
    html += `<div class="chips">`;
    q.options.forEach(o => { html += `<div class="chip ${arr.includes(o)?'selected':''}" data-key="${q.key}" data-value="${o}" data-multi="true">${arr.includes(o)?'✓ ':''}${o}</div>`; });
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function bindFieldEvents(questions) {
  // Text inputs & textareas: just store value, no re-render
  document.querySelectorAll('.field input, .field textarea').forEach(el => {
    el.addEventListener('input', e => {
      answers[e.target.dataset.key] = e.target.value;
      updateNavButton();
    });
  });
  // Selects: store + re-render (for conditional fields like "Autre")
  document.querySelectorAll('.field select').forEach(el => {
    el.addEventListener('change', e => {
      answers[e.target.dataset.key] = e.target.value;
      render();
    });
  });
  document.querySelectorAll('.chip').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.key;
      const value = el.dataset.value;
      if (el.dataset.multi === "true") {
        const arr = answers[key] || [];
        answers[key] = arr.includes(value) ? arr.filter(v => v !== value) : [...arr, value];
      } else {
        answers[key] = answers[key] === value ? "" : value;
      }
      render();
    });
  });
}

function updateNavButton() {
  const btn = document.querySelector('.btn-next');
  if (!btn) return;
  const canGo = canAdvance();
  if (canGo) { btn.classList.remove('disabled'); } else { btn.classList.add('disabled'); }
}

function canAdvance() {
  const step = STEPS[currentStep];
  const questions = QUESTIONS[step.id] || [];
  return questions.filter(q => q.required && (!q.showIf || q.showIf(answers))).every(q => {
    const v = answers[q.key];
    return v && (Array.isArray(v) ? v.length > 0 : v.toString().trim() !== "");
  });
}

function next() {
  if (!canAdvance()) {
    const card = document.getElementById("card");
    card.classList.add("shake");
    setTimeout(() => card.classList.remove("shake"), 400);
    return;
  }
  if (currentStep < STEPS.length - 1) { currentStep++; render(); window.scrollTo(0,0); }
}

function prev() { if (currentStep > 0) { currentStep--; render(); window.scrollTo(0,0); } }
function goTo(i) { currentStep = i; render(); window.scrollTo(0,0); }

function renderRecap() {
  const allQ = Object.values(QUESTIONS).flat();
  const filled = allQ.filter(q => {
    if (q.showIf && !q.showIf(answers)) return false;
    const v = answers[q.key];
    return v && (Array.isArray(v) ? v.length > 0 : v.toString().trim() !== "");
  });

  let html = `<div class="recap-banner ${sent ? 'success' : 'pending'}">
    ${sent
      ? `✅ Réponses envoyées ! Merci ${answers.prenom || ''}, je reviens vers vous très vite.`
      : `🎉 Merci ${answers.prenom || ''} ! Voici le récap de vos réponses.`}
  </div>`;

  filled.forEach(q => {
    const v = answers[q.key];
    const display = Array.isArray(v) ? v.join(", ") : v;
    html += `<div class="recap-item">
      <div class="label">${q.label.replace(/\(.*\)/,'').trim()}</div>
      <div class="value">${display}</div>
    </div>`;
  });

  html += `<div id="errorBox" class="error-box" style="display:none"></div>`;
  html += `<div class="recap-actions">`;
  if (!sent) {
    html += `<button class="btn btn-submit" id="btnSubmit" onclick="submitToNotion()">🚀 Envoyer mes réponses</button>`;
  }
  html += `<button class="btn btn-copy" onclick="copyAnswers()">📋 Copier les réponses</button>`;
  html += `</div>`;
  return html;
}

async function submitToNotion() {
  const btn = document.getElementById("btnSubmit");
  const errBox = document.getElementById("errorBox");
  btn.textContent = "⏳ Envoi en cours…";
  btn.classList.add("sending");
  errBox.style.display = "none";

  try {
    const res = await fetch("/api/submit", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(answers),
    });
    if (!res.ok) throw new Error("Erreur serveur");
    sent = true;
    render();
  } catch (err) {
    errBox.textContent = "⚠️ Erreur lors de l'envoi. Réessayez ou copiez les réponses.";
    errBox.style.display = "block";
    btn.textContent = "🚀 Envoyer mes réponses";
    btn.classList.remove("sending");
  }
}

function copyAnswers() {
  const allQ = Object.values(QUESTIONS).flat();
  const text = allQ
    .filter(q => { if (q.showIf && !q.showIf(answers)) return false; const v=answers[q.key]; return v&&(Array.isArray(v)?v.length>0:v.toString().trim()!==""); })
    .map(q => { const v=answers[q.key]; return `${q.label}\n→ ${Array.isArray(v)?v.join(", "):v}`; })
    .join("\n\n");
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = "✅ Copié !";
    setTimeout(() => btn.textContent = "📋 Copier les réponses", 2000);
  });
}

// Init
render();
</script>
</body>
</html>
